# Default workflow configuration for the captain.
# Copy to .crew/workflow.yaml and customize.

workflow:
  name: default
  execution:
    mode: judgment
  steps:
    - role: coder
      agent: CODEX
      action: implement

    - role: reviewer
      agent: CLAUDE_CODE
      action: review
      max_passes: 3

    - role: judge
      agent: CAPTAIN
      action: evaluate_review
      criteria:
        - "Are the review findings actionable?"
        - "Is the fix complete and correct?"

    - role: coder
      agent: CODEX
      action: fix_review_issues
      condition: "judge says fixes needed"

  completion:
    strategy: judge_approval
    fallback: max_passes

agents:
  CLAUDE_CODE:
    adapter: CLAUDE_CODE
    auth: subscription
    model: CLAUDE_OPUS
    strengths:
      - implementation
      - refactoring
      - TypeScript
      - React

  CODEX:
    adapter: CODEX
    auth: subscription
    model: GPT_CODEX
    strengths:
      - implementation
      - review
      - testing
      - Python
      - TypeScript
      - React
      - security

captain:
  cli: CLAUDE_CODE
  # Per-CLI captain-model map. Legacy scalar form (`model: CLAUDE_SONNET`) is
  # still accepted; this shape lets the user switch captain.cli without
  # re-editing the model.
  model:
    claude-code: CLAUDE_SONNET
    codex: GPT
    gemini-cli: QWEN
  # Preset key (into top-level `presets`). Missing → no hint is injected into
  # the captain's system prompt. M3 ships `default` only; /preset (M5) adds
  # user-selectable presets at runtime.
  preset: default

presets:
  default:
    description: >-
      General-purpose captain behavior: balanced code review, task planning, and
      direct answers for trivial requests.
    hint: >-
      Prefer running a review pass after implementation work. Call `finish` when
      the user's request is addressed — do not wait for external confirmation.
      Reach for `ask_user` only when you are genuinely blocked; for clarifications
      that require no user input, answer inline and continue. Budget warnings
      arrive on tool results; treat them as advisory and decide whether to stop.

error_handling:
  default:
    retry: 1
    fallback: null
    on_exhausted: ask_user
