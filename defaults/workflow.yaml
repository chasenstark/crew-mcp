# Default workflow configuration for the captain.
# Copy to .crew/workflow.yaml and customize.

workflow:
  name: default
  execution:
    mode: judgment
  steps:
    - role: coder
      agent: CODEX
      action: implement

    - role: reviewer
      agent: CLAUDE_CODE
      action: review
      max_passes: 3

    - role: judge
      agent: CAPTAIN
      action: evaluate_review
      criteria:
        - "Are the review findings actionable?"
        - "Is the fix complete and correct?"

    - role: coder
      agent: CODEX
      action: fix_review_issues
      condition: "judge says fixes needed"

  completion:
    strategy: judge_approval
    fallback: max_passes

agents:
  CLAUDE_CODE:
    adapter: CLAUDE_CODE
    auth: subscription
    model: CLAUDE_OPUS
    strengths:
      - implementation
      - refactoring
      - TypeScript
      - React

  CODEX:
    adapter: CODEX
    auth: subscription
    model: GPT_CODEX
    strengths:
      - implementation
      - review
      - testing
      - Python
      - TypeScript
      - React
      - security

captain:
  cli: CLAUDE_CODE
  model: CLAUDE_SONNET

error_handling:
  default:
    retry: 1
    fallback: null
    on_exhausted: ask_user
