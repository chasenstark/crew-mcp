# Default workflow configuration for the captain.
# Copy to .crew/workflow.yaml and customize.

workflow:
  name: default
  execution:
    mode: judgment
  steps:
    - role: coder
      agent: CODEX
      action: implement

    - role: reviewer
      agent: CLAUDE_CODE
      action: review
      max_passes: 3

    - role: judge
      agent: CAPTAIN
      action: evaluate_review
      criteria:
        - "Are the review findings actionable?"
        - "Is the fix complete and correct?"

    - role: coder
      agent: CODEX
      action: fix_review_issues
      condition: "judge says fixes needed"

  completion:
    strategy: judge_approval
    fallback: max_passes

agents:
  CLAUDE_CODE:
    adapter: CLAUDE_CODE
    auth: subscription
    model: CLAUDE_OPUS
    strengths:
      - implementation
      - refactoring
      - TypeScript
      - React

  CODEX:
    adapter: CODEX
    auth: subscription
    model: GPT_CODEX
    strengths:
      - implementation
      - review
      - testing
      - Python
      - TypeScript
      - React
      - security

captain:
  cli: CLAUDE_CODE
  # Per-CLI captain-model map. Legacy scalar form (`model: CLAUDE_SONNET`) is
  # still accepted; this shape lets the user switch captain.cli without
  # re-editing the model.
  model:
    claude-code: CLAUDE_SONNET
    codex: GPT
    gemini-cli: QWEN
  # Preset key (into top-level `presets`). Missing → no hint is injected into
  # the captain's system prompt. Three built-ins ship below (`default`,
  # `thorough-review`, `read-only`); `/preset <name>` overrides this at
  # runtime for a single session.
  preset: default

presets:
  default:
    description: >-
      General-purpose captain behavior: balanced code review, task planning, and
      direct answers for trivial requests.
    hint: >-
      Calibrate dialogue to the size of the ask. For multi-step or larger
      requests ("rework the config", "improve the auth module"), share a brief
      plan via `message_user` and wait for confirmation before dispatching.
      For trivial, well-specified asks (fix this typo, rename X to Y), just do
      the work — don't add ceremony. Use `ask_user` to clarify ambiguous intent
      or align on approach; `message_user` (non-blocking) is the right tool for
      sharing plans and progress. Prefer a review pass after implementation
      work. Call `finish` when the request is addressed and (for planned work)
      the result is verified. Budget warnings arrive on tool results; treat
      them as advisory.

  thorough-review:
    description: >-
      Fan out to multiple reviewers before calling finish. Prioritize catching
      regressions over shipping quickly.
    hint: >-
      After any implementation `run_agent` call, dispatch a second reviewer with
      a distinct perspective (a different agent where available, or a clearly
      different review angle). Only call `finish` after at least one review pass
      has landed. Prefer explicit reasoning about review findings inline over
      calling `analyze_output` — reviewers return structured feedback already.
    suggested_agent_roles:
      - reviewer
      - security
      - tests

  read-only:
    description: >-
      Analyze and suggest; do not modify files. Good for exploratory work or
      when the user has not yet agreed to edits.
    hint: >-
      Do not dispatch `run_agent` calls that write files. When the user asks for
      a change, reply inline with a diff or a prose description of the proposed
      edit and ask the user to confirm before proceeding. If a `run_agent` call
      is the right tool, scope its prompt to read-only analysis (inspect code,
      produce a report) — never "make the change".
    suggested_agent_roles:
      - analyst
      - reviewer

error_handling:
  default:
    retry: 1
    fallback: null
    on_exhausted: ask_user
