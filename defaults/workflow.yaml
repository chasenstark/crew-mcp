# Default workflow configuration for the orchestrator.
# Copy to .orchestra/workflow.yaml and customize.

workflow:
  name: default
  execution:
    mode: judgment
  steps:
    - role: coder
      agent: codex
      action: implement

    - role: reviewer
      agent: claude-code
      action: review
      max_passes: 3

    - role: judge
      agent: orchestrator
      action: evaluate_review
      criteria:
        - "Are the review findings actionable?"
        - "Is the fix complete and correct?"

    - role: coder
      agent: codex
      action: fix_review_issues
      condition: "judge says fixes needed"

  completion:
    strategy: judge_approval
    fallback: max_passes

agents:
  claude-code:
    adapter: claude-code
    auth: subscription
    model: claude-opus-4-6
    strengths:
      - implementation
      - refactoring
      - TypeScript
      - React

  codex:
    adapter: codex
    auth: subscription
    model: gpt-5.3-codex
    strengths:
      - implementation
      - review
      - testing
      - Python
      - TypeScript
      - React
      - security

orchestrator:
  cli: claude-code
  model: claude-sonnet-4-6

error_handling:
  default:
    retry: 1
    fallback: null
    on_exhausted: ask_user
